title: "文本人化规则"
summary: "去除 AI 写作痕迹，让文本更像人类作者所写。"
usage:
  - "writer 可把它当成风格约束，避免高频 AI 词和过度工整句式。"
  - "reviewer 可把它当成审查规则，优先检查禁用表达和自然度。"

banned_phrases:
  - phrase: "然而"
    replacements: ["但是", "不过", "可", "却"]
    note: "优先换成更口语、更贴近场景的转折。"
  - phrase: "不禁"
    replacements: ["直接删掉", "直接写动作或感受"]
    note: "避免解释性连接词。"
  - phrase: "缓缓"
    replacements: ["慢慢", "逐渐", "一点点"]
    note: "少用悬浮副词。"
  - phrase: "微微一笑"
    replacements: ["笑了笑", "嘴角上扬", "露出笑容"]
    note: "不要所有角色都一个笑法。"
  - phrase: "心中暗想"
    replacements: ["心想", "琢磨着", "想着"]
    note: "能删就删，尽量让思考落在动作里。"
  - phrase: "眼中闪过一丝"
    replacements: ["直接描述眼神变化", "目光一动", "眼神变了"]
    note: "避免模板化眼神描写。"
  - phrase: "嘴角微微上扬"
    replacements: ["笑了", "咧嘴笑了"]
    note: "高频 AI 表达。"
  - phrase: "深吸一口气"
    replacements: ["吸了口气", "长出一口气"]
    note: "保留动作，但别写得太模板。"
  - phrase: "不由得"
    replacements: ["直接写结果", "控制不住"]
    note: "避免把动作和心理再解释一遍。"
  - phrase: "难以置信"
    replacements: ["没想到", "想不到", "离谱"]
    note: "优先换成角色会说的话。"
  - phrase: "若有所思"
    replacements: ["想了想", "琢磨着"]
    note: "抽象词改成具体动作。"
  - phrase: "似乎"
    replacements: ["好像", "像是", "直接写判断"]
    note: "模糊词适度使用。"
  - phrase: "仿佛"
    replacements: ["好像", "像是", "如同"]
    note: "比喻不要密集堆叠。"
  - phrase: "刹那间"
    replacements: ["瞬间", "一下子", "突然"]
    note: "能不用成语就不用。"
  - phrase: "顿时"
    replacements: ["一下子", "立刻", "马上"]
    note: "少用整齐的书面副词。"
  - phrase: "油然而生"
    replacements: ["心里生出一股", "忽然有了"]
    note: "尽量贴近人物口吻。"
  - phrase: "恍然大悟"
    replacements: ["明白了", "想通了"]
    note: "直接写认知变化。"
  - phrase: "莫名其妙"
    replacements: ["搞不懂", "纳闷", "奇怪"]
    note: "优先口语表达。"
  - phrase: "delve"
    replacements: ["explore", "examine", "look into"]
    note: "英文写作时的典型 AI 高频词。"
  - phrase: "tapestry"
    replacements: ["complex system", "interwoven elements"]
    note: "英文写作时避免宏大空词。"
  - phrase: "embark"
    replacements: ["start", "begin", "set out"]
    note: "英文写作时避免腔调过重。"
  - phrase: "landscape"
    replacements: ["situation", "context", "environment"]
    note: "英文写作时避免套话。"
  - phrase: "It's important to note"
    replacements: ["直接说重点"]
    note: "英文写作时别先摆架子。"
  - phrase: "In conclusion"
    replacements: ["自然收尾"]
    note: "英文写作时避免教科书式收束。"
  - phrase: "Not only... but also"
    replacements: ["both... and", "... as well as"]
    note: "英文写作时避免过整齐对称。"

natural_imperfections:
  allowed:
    - type: "片段句"
      examples: ["行吧。", "也好。", "算了。"]
    - type: "重复用词"
      examples: ["他就站在那里，就站在门口。"]
    - type: "口语化表达"
      examples: ["那啥，你去不去？"]
    - type: "不完整思考"
      examples: ["如果……算了，不想了。"]
    - type: "突然转折"
      examples: ["他很认真。但其实并没有。"]
    - type: "冗余修饰"
      examples: ["那个、那个……我忘了。"]
  avoid:
    - pattern: "第一……第二……第三……"
      reason: "太像生成式模板。"
      fix: "打散为自然叙述。"
    - pattern: "每段都有于是、然后、接着"
      reason: "过渡过满。"
      fix: "省略部分过渡，让动作自己衔接。"
    - pattern: "每段长度都差不多"
      reason: "节奏太齐。"
      fix: "长短段落交替。"
    - pattern: "每个想法都解释完整"
      reason: "没有留白。"
      fix: "允许读者自己补全。"

sentence_variation:
  target_ratio:
    short: "30-40%"
    medium: "40-50%"
    long: "15-20%"
  opening_rules:
    - "避免连续 3 句以上都以他/她/它开头。"
    - "避免连续 3 句以上都以然后/于是/接着开头。"
    - "避免连续 2 句以上使用不仅……而且……。"
  rewrite_examples:
    - bad: "他走到门前。他敲了敲门。他等了一会儿。"
      good: "他走到门前，敲了敲门。等了一会儿，没人应。"

emotional_expression:
  principles:
    - "展示而非告知。"
    - "情绪高潮后接一句日常，压住煽情。"
    - "用细节传递情感，不直接说很感动、很愤怒。"
  show_not_tell:
    - tell: "他感到很愤怒。"
      show: "他攥紧拳头，指节发白。"
    - tell: "她很紧张。"
      show: "她的手指不停地绕着衣角。"

dialogue_naturalization:
  role_signals:
    - role: "老人"
      traits: ["口语化", "省略主语", "老话俗语"]
    - role: "小孩"
      traits: ["短句", "重复", "语气词"]
    - role: "学者"
      traits: ["书面语", "从句多", "术语"]
    - role: "粗人"
      traits: ["直白", "俚语", "句式简单"]
  rules:
    - "两人快速对话时可以省略对话标签。"
    - "信息提供者每说 1-2 个信息点，接收者必须有反应。"
  ping_pong_example:
    good:
      - "今晚八点，老地方。"
      - "八点？和谁？"
      - "就我们。"
    bad:
      - "今晚八点，老地方，就我们，不见不散。"

checklist:
  - "无禁用表达清单中的高频词。"
  - "短句占比达到 30% 以上。"
  - "没有连续 3 句相同开头。"
  - "情感以展示为主，不靠直接告知。"
  - "对话有区分度。"
  - "煽情段落后有冷静转折。"
  - "保留自然的不完美。"
